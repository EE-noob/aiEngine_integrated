信号名?信号位宽?方向?信号功能描述?备注?
clk?1?Input?系统时钟信号?所有时序逻辑的同步时钟?
rst_n?1?Input?异步复位信号?低电平有效，复位整个模块?
init_cfg?1?Input?配置参数锁存触发信号?单拍脉冲，触发模块从IDLE进入INIT状态?
load_weight_req?1?Output?访存授权申请信号?模块向外部调度器申请下一次访存权限?
load_weight_granted?1?Input?访存授权应答信号?外部调度器授权模块进行访存操作?
send_weight_trigger?1?Input?权重发送触发信号?单拍脉冲，触发模块开始逐行输出当前Tile数据?
k?REG_WIDTH?Input?输入激活矩阵行数?配置参数，用于计算循环次数，在init_cfg期间保持稳定?
n?REG_WIDTH?Input?权重矩阵行数?配置参数，等于输入激活矩阵列数，在init_cfg期间保持稳定?
m?REG_WIDTH?Input?权重矩阵列数?配置参数，等于输出矩阵列数，在init_cfg期间保持稳定?
rhs_zp?REG_WIDTH?Input?权重零点偏移值?有符号数，用于量化补偿，仅使用低8位?
rhs_col_stride_b?REG_WIDTH?Input?权重列间地址间距?单位为字节，表示相邻两列的地址偏移?
rhs_base?REG_WIDTH?Input?权重数据基地址?第一个Tile的起始访存地址?
icb_cmd_valid?1?Output?ICB命令有效信号?读请求握手信号?
icb_cmd_ready?1?Input?ICB命令就绪信号?从设备准备接收命令?
icb_cmd_read?1?Output?ICB读操作标志?固定为1表示读操作?
icb_cmd_addr?REG_WIDTH?Output?ICB命令地址?当前读请求的起始地址?
icb_cmd_len?4?Output?ICB Burst长度?实际长度为icb_cmd_len+1个传输?
icb_rsp_valid?1?Input?ICB响应有效信号?读响应握手信号?
icb_rsp_ready?1?Output?ICB响应就绪信号?模块准备接收响应数据?
icb_rsp_rdata?BUS_WIDTH?Input?ICB读响应数据?从存储器返回的权重数据?
icb_rsp_err?1?Input?ICB错误标志?指示本次传输是否出错?
weight_sending_done?1?Output?Tile发送完成信号?单拍脉冲，指示当前Tile所有SIZE行已输出?
weight_row_valid?1?Output?输出行有效信号?指示weight_out上的数据有效可采样?
weight_out?DATA_WIDTH×SIZE?Output?输出权重数据数组?并行输出SIZE个有符号8位权重元素?
weight_data_valid?1?Output?Tile数据就绪信号?指示当前Tile已完整加载可供发送?